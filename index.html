<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Swing Demo</title>
    <!-- 1. Load CheerpJ Loader Script -->
    <script src="https://leaningtech.com"></script>
</head>
<body>
    <script type="module">
        // 2. Wait for CheerpJ engine to download and initialize
        await cheerpjInit();
        
        // 3. Open an 800x800 display area
        cheerpjCreateDisplay(800, 800);
        
        // 4. Run the JAR using CheerpJ's required virtual server mount point /app/
        await cheerpjRunJar("/app/BallBounce.jar", "Game");
    </script>
</body>
</html>
