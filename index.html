<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Swing Demo</title>
</head>
<body>
    <!-- Canvas wrapper matching your DIMS size exactly -->
    <div id="game-container" style="width: 800px; height: 800px; margin: 0 auto; background: black;"></div>

    <script type="module">
        // Dynamically import CheerpJ to guarantee it's fully defined in memory first
        import { cheerpjInit, cheerpjCreateDisplay, cheerpjRunJar } from "https://leaningtech.com";

        try {
            // 1. Initialize the engine
            await cheerpjInit();
            
            // 2. Open your display area inside our styled container
            cheerpjCreateDisplay(800, 800, document.getElementById("game-container"));
            
            // 3. Run your executable game JAR file
            await cheerpjRunJar("/app/BallBounce.jar", "Game");
            console.log("CheerpJ initialized and running successfully!");
        } catch (error) {
            console.error("CheerpJ failed to initialize:", error);
        }
    </script>
</body>
</html>
